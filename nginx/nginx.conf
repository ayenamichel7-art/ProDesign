events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    resolver 127.0.0.11 valid=10s;

    upstream frontend {
        server frontend:80;
    }

    upstream backend {
        server backend:8080;
    }

    # Configuration Cloudflare Real-IP
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    
    real_ip_header CF-Connecting-IP;

    # Rate Limiting DDoS
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # Masquer l'identité du serveur
    server_tokens off;

    # ── REDIRECTION HTTP → HTTPS ──
    server {
        listen 80;
        # En production, décommenter la ligne suivante et commenter le bloc location:
        # return 301 https://$host$request_uri;

        # En développement (pas de cert SSL), on sert directement en HTTP:
        client_max_body_size 1G;

        # ── EN-TÊTES DE SÉCURITÉ ──
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location / {
            proxy_pass http://frontend;
        }

        location /api/auth/ {
            # Rate limiting strict sur l'authentification (5 req/s max)
            limit_req zone=auth_limit burst=10 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /outputs/ {
            proxy_pass http://backend/outputs/;
        }

        location /affiche/ {
            alias /app/affiche/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Assets spécifiques du backend (mockups pour les rendus)
        location /assets/mockups/ {
            proxy_pass http://backend/assets/mockups/;
        }

        # Les assets du frontend (JS/CSS) sont gérés par la règle par défaut /

        location /video/ {
            proxy_pass http://video-engine:3000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── SERVEUR HTTPS (décommenter en production) ──
    # Générer les certificats:
    #   mkdir -p /etc/nginx/ssl
    #   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
    #     -keyout /etc/nginx/ssl/privkey.pem \
    #     -out /etc/nginx/ssl/fullchain.pem \
    #     -subj "/CN=prodesign.local"
    #
    # Ou utiliser Let's Encrypt / Certbot en production.

    # server {
    #     listen 443 ssl http2;
    #     client_max_body_size 1G;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     # EN-TÊTES DE SÉCURITÉ
    #     add_header X-XSS-Protection "1; mode=block" always;
    #     add_header X-Content-Type-Options "nosniff" always;
    #     add_header X-Frame-Options "SAMEORIGIN" always;
    #     add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    #
    #     # (Copier ici les mêmes blocs location que le serveur HTTP ci-dessus)
    # }
}
